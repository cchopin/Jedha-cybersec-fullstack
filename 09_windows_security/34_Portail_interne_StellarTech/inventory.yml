# ============================================
# Inventaire Ansible pour Lab 34
# ============================================
# Cet inventaire definit localhost comme hote
# car Ansible communique avec GNS3 via son API REST.

all:
  hosts:
    localhost:
      ansible_connection: local
  vars:
    # Charger les variables depuis group_vars/all.yml
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
